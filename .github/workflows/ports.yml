name: ports
on: [push, pull_request]
permissions:
  contents: read
jobs:
  javascript:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ports/javascript } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Smoke test (JS port)
        run: node test.mjs
      - name: CLI diff returns non-zero on findings
        run: |
          node index.js diff ../fixtures/sbom-old.json ../fixtures/sbom-new.json && \
            { echo "expected non-zero exit"; exit 1; } || echo "gate failed as expected"

  go:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ports/go } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.21" }
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: CLI diff returns non-zero on findings
        run: |
          go run . diff ../fixtures/sbom-old.json ../fixtures/sbom-new.json && \
            { echo "expected non-zero exit"; exit 1; } || echo "gate failed as expected"

  rust:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ports/rust } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --quiet
      - name: Test
        run: cargo test --quiet
      - name: CLI diff returns non-zero on findings
        run: |
          cargo run --quiet -- diff ../fixtures/sbom-old.json ../fixtures/sbom-new.json && \
            { echo "expected non-zero exit"; exit 1; } || echo "gate failed as expected"
