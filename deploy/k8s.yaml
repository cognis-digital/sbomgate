apiVersion: apps/v1
kind: Deployment
metadata: { name: sbomgate, labels: { app: sbomgate } }
spec:
  replicas: 1
  selector: { matchLabels: { app: sbomgate } }
  template:
    metadata: { labels: { app: sbomgate } }
    spec:
      containers:
        - name: sbomgate
          image: ghcr.io/cognis-digital/sbomgate:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: sbomgate }
spec:
  selector: { app: sbomgate }
  ports: [{ port: 80, targetPort: 8000 }]
